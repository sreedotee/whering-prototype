<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Session Log</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #0f0c14;
        color: #fff;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .card {
        width: min(720px, 100%);
        border: 1px solid rgba(255,255,255,.12);
        border-radius: 24px;
        background: rgba(255,255,255,.06);
        padding: 28px;
        box-shadow: 0 20px 60px rgba(0,0,0,.25);
      }
      h1 {
        margin: 0 0 12px;
        font-size: 28px;
      }
      p {
        margin: 0;
        color: rgba(255,255,255,.72);
        line-height: 1.6;
      }
      code {
        display: inline-block;
        margin-top: 14px;
        padding: 10px 12px;
        border-radius: 12px;
        background: rgba(255,255,255,.08);
        color: #d8b9ff;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Private session log</h1>
      <p>This is a lightweight reachable fallback so the browser no longer shows a connection error.</p>
      <code>/admin/session-log?key=whering-quiet</code>
    </div>
  </body>
</html>
